name: Sync SSL Certs

on:
  schedule:
    - cron: "0 3 * * *"   # Daily at 3am UTC
  workflow_dispatch:        # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Restore cert cache
        uses: actions/cache/restore@v4
        id: cert-cache-restore
        with:
          path: .cert_cache.json
          key: cert-cache-${{ github.run_id }}
          restore-keys: |
            cert-cache-

      - name: Create config from secrets
        run: |
          cat > config.yaml << 'EOF'
          tencent:
            secret_id: "${{ secrets.TENCENT_SECERT_ID }}"
            secret_key: "${{ secrets.TENCENT_SECRET_KEY }}"
            region: "ap-guangzhou"
          qiniu:
            access_key: "${{ secrets.QINIU_ACCESS_KEY }}"
            secret_key: "${{ secrets.QINIU_SECRET_KEY }}"
          sync:
            force_https: true
          EOF

      - name: Run sync
        run: npx tsx src/cli.ts sync

      - name: Save cert cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .cert_cache.json
          key: cert-cache-${{ github.run_id }}
